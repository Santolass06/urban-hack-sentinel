site_name: Urban Hack Sentinel
site_description: Unified wireless/Bluetooth/IoT auditing framework for Raspberry Pi
site_author: André Santos
site_url: https://github.com/Santolass06/urban-hack-sentinel
repo_url: https://github.com/Santolass06/urban-hack-sentinel
repo_name: urban-hack-sentinel

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src/urban_hs]
          options:
            show_source: true
            show_signature: true
            show_signature_annotations: true
            show_root_heading: true
            show_root_toc_entry: true
            show_category_heading: true
            merge_init_into_class: true
            show_breadcrumbs: true
            docstring_style: google
            members_order: source
            docstring_section_style: spacy
            show_root_members_full_path: false
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: twemoji
      emoji_generator: to_svg
  - admonition
  - pymdownx.details
  - pymdownx.keys
  - attr_list
  - md_in_html
  - toc:
      permalink: true

