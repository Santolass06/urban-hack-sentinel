      - Storage Layer: core/storage.md
      - Health Checks: core/health.md
      - Scheduler: core/scheduler.md
      - Plugin System: core/plugins.md
      - Concurrency: core/concurrency.md
      - Memory Profiling: core/memory.md
      - Security: core/security.md
  - Modules:
      - WiFi: modules/wifi.md
      - BLE / WhisperPair: modules/ble.md
      - Network: modules/network.md
      - Camera: modules/camera.md
      - Metasploit: modules/metasploit.md
      - Exploits: modules/exploit.md
      - HID / USB: modules/hid.md
      - Bluetooth HID: modules/bt_hid.md
      - Camera Exploits: modules/camera_exploits.md
      - MQTT: modules/mqtt.md
      - ESP32: modules/esp32.md
