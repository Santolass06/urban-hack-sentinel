name: CI

on:
  push:
    branches: [main, andreas/catarinus]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/urban_hs/
      - name: Ruff format check
        run: ruff format --check src/urban_hs/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install httpx
      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_ble_module.py --ignore=tests/test_e2e.py
