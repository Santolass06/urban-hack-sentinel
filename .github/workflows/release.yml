name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_short=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/version = \".*\"/version = \"${{ steps.version.outputs.version_short }}\"/" pyproject.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -x

      - name: Build and push Docker images (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.arm64
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM with Syft
        uses: anchore/syft-action@v0.15.0
        with:
          format: spdx-json
          output: sbom-${{ steps.version.outputs.version }}.spdx.json
        env:
          SYFT_SBOM_FORMAT: spdx-json

      - name: Generate CycloneDX SBOM
        run: |
          syft packages dir:. -o cyclonedx-json=sbom-${{ steps.version.outputs.version }}.cdx.json

      - name: Sign SBOM with Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.3'

      - name: Sign SBOM artifacts
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign-blob --key env://COSIGN_PRIVATE_KEY \
            --output-signature sbom-${{ steps.version.outputs.version }}.spdx.json.sig \
            sbom-${{ steps.version.outputs.version }}.spdx.json
          cosign sign-blob --key env://COSIGN_PRIVATE_KEY \
            --output-signature sbom-${{ steps.version.outputs.version }}.cdx.json.sig \
            sbom-${{ steps.version.outputs.version }}.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.version.outputs.version }}
          path: |
            sbom-${{ steps.version.outputs.version }}.spdx.json
            sbom-${{ steps.version.outputs.version }}.cdx.json
            sbom-${{ steps.version.outputs.version }}.spdx.json.sig
            sbom-${{ steps.version.outputs.version }}.cdx.json.sig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            sbom-${{ steps.version.outputs.version }}.spdx.json
            sbom-${{ steps.version.outputs.version }}.cdx.json
            sbom-${{ steps.version.outputs.version }}.spdx.json.sig
            sbom-${{ steps.version.outputs.version }}.cdx.json.sig

      - name: Update version in pyproject.toml
        if: success()
        run: |
          sed -i "s/version = \".*\"/version = \"${{ steps.version.outputs.version_short }}\"/" pyproject.toml
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - name: Notify on failure
        if: failure()
        run: |
          echo "Release failed for version ${{ steps.version.outputs.version }}"
          # Add Slack/Discord/Email notification here

      - name: Notify on success
        if: success()
        run: |
          echo "Release ${{ steps.version.outputs.version }} completed successfully!"
          # Add Slack/Discord/Email notification here