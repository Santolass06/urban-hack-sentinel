<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Hack Sentinel v3 — Web UI</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #1a1d23;
            --text: #e6e6e6;
            --muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --amber: #d29922;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        header {
            padding: 1rem 1.5rem;
            background: var(--panel);
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container { padding: 1.5rem; display: grid; gap: 1.5rem; }
        .card {
            background: var(--panel);
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
        button {
            background: var(--accent);
            color: #fff;
            border: 0;
            padding: 0.5rem 0.75rem;
            border-radius: 0.35rem;
            cursor: pointer;
            font-weight: 600;
        }
        button.secondary { background: #30363d; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .terminal {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.8rem;
            line-height: 1.4;
            min-height: 220px;
            max-height: 360px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        input, select {
            background: #0d1117;
            color: var(--text);
            border: 1px solid #30363d;
            padding: 0.35rem 0.5rem;
            border-radius: 0.3rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.4rem;
            border-radius: 0.3rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: #30363d;
        }
        .badge.ok { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge.err { background: rgba(248,81,73,0.15); color: var(--red); }
        .status-online { color: var(--green); }
        .status-offline { color: var(--red); }
        .attack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; }
        .attack-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.4rem;
            padding: 0.6rem 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .attack-card h3 { margin: 0; font-size: 0.95rem; }
        .attack-card p { margin: 0; color: var(--muted); font-size: 0.8rem; }
        .login-overlay {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--panel);
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            padding: 2rem 2.5rem;
            text-align: center;
            max-width: 360px;
        }
        .login-box h2 { margin-top: 0; }
        .login-box .msg { color: var(--amber); font-size: 0.85rem; margin-bottom: 0.75rem; min-height: 1.2em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>Urban Hack Sentinel</h2>
            <p class="msg" id="login-msg"></p>
            <button id="btn-connect" onclick="doLogin()">Connect</button>
        </div>
    </div>

    <header>
        <div>
            <strong>Urban Hack Sentinel v3</strong>
            <span class="badge ok" id="status-badge">online</span>
        </div>
        <div class="row">
            <span class="badge" id="arch-badge">--</span>
            <span class="badge" id="job-badge">job: --</span>
            <button class="secondary" onclick="doLogout()" style="font-size:0.75rem;padding:0.3rem 0.5rem">Logout</button>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2 style="margin-top:0">System</h2>
            <div class="row">
                <span id="sys-info">Loading…</span>
            </div>
        </section>

        <section class="card">
            <h2 style="margin-top:0">Attacks</h2>
            <div id="attacks-root">Loading inventory…</div>
            <div class="terminal" id="attack-output">(idle)</div>
        </section>

        <section class="card">
            <h2 style="margin-top:0">WiFi</h2>
            <div class="row">
                <input id="wifi-iface" value="wlan1" placeholder="Interface (ex: wlan1)" />
                <button onclick="wifiScan()">Scan</button>
                <button class="secondary" onclick="wifiInterfaces()">List interfaces</button>
            </div>
            <pre class="terminal" id="wifi-output">(idle)</pre>
        </section>

        <section class="card">
            <h2 style="margin-top:0">BLE</h2>
            <div class="row">
                <input id="ble-duration" type="number" value="10" style="width: 80px" />
                <button onclick="bleScan()">Scan Fast Pair</button>
            </div>
            <pre class="terminal" id="ble-output">(idle)</pre>
        </section>

        <section class="card">
            <h2 style="margin-top:0">Network</h2>
            <div class="row">
                <input id="net-target" value="192.168.1.0/24" placeholder="Target (CIDR)" />
                <button onclick="netScan()">Host Discovery</button>
            </div>
            <pre class="terminal" id="net-output">(idle)</pre>
        </section>

        <section class="card">
            <h2 style="margin-top:0">Live Feed</h2>
            <pre class="terminal" id="logs-output">(connecting…)</pre>
        </section>
    </main>

    <script>
        const API = '/api/v1';
        let authToken = localStorage.getItem('uhs_token') || null;
        let attackJobs = {};

        function showLogin(msg) {
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('login-msg').textContent = msg || '';
        }

        function hideLogin() {
            document.getElementById('login-overlay').classList.add('hidden');
        }

        async function doLogin() {
            const btn = document.getElementById('btn-connect');
            btn.disabled = true;
            btn.textContent = 'Connecting…';
            try {
                const res = await fetch(API + '/auth/token', { method: 'POST' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                authToken = data.access_token;
                localStorage.setItem('uhs_token', authToken);
                hideLogin();
                init();
            } catch (e) {
                document.getElementById('login-msg').textContent = 'Falha ao conectar: ' + (e.message || e);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Connect';
            }
        }

        function doLogout() {
            authToken = null;
            localStorage.removeItem('uhs_token');
            location.reload();
        }

        function api(path, opts = {}) {
            return fetch(API + path, {
                ...opts,
                headers: {
                    'Content-Type': 'application/json',
                    ...(authToken ? { 'Authorization': 'Bearer ' + authToken } : {})
                }
            }).then(res => {
                if (res.status === 401 || res.status === 403) {
                    authToken = null;
                    localStorage.removeItem('uhs_token');
                    showLogin('Sessão expirada, reconecta');
                    throw new Error('Unauthorized');
                }
                return res.json().catch(() => ({}));
            });
        }

        function appendLog(nodeId, message) {
            const node = document.getElementById(nodeId);
            if (!node) return;
            const prefix = '[' + new Date().toLocaleTimeString() + '] ';
            node.textContent = node.textContent === '(connecting…)' || node.textContent === '(idle)'
                ? prefix + message
                : node.textContent + '\n' + prefix + message;
            node.scrollTop = node.scrollHeight;
        }

        function setJobBadge(jobId) {
            document.getElementById('job-badge').textContent = jobId ? 'job: ' + jobId : 'job: --';
        }

        async function loadAttacks() {
            try {
                const j = await api('/attacks');
                const root = document.getElementById('attacks-root');
                if (!j.attacks.length) {
                    root.textContent = 'No attacks available.';
                    return;
                }
                const grid = document.createElement('div');
                grid.className = 'attack-grid';
                j.attacks.forEach(a => {
                    const card = document.createElement('div');
                    card.className = 'attack-card';
                    card.innerHTML = '<h3>' + escapeHtml(a.name) + '</h3>' +
                        '<p>' + escapeHtml(a.description || '') + '</p>' +
                        '<div class="row"><button onclick="runAttack(\'' + escapeJs(a.name) + '\')">Run</button>' +
                        '<button class="secondary" onclick="dryRun(\'' + escapeJs(a.name) + '\')">Dry run</button></div>';
                    grid.appendChild(card);
                });
                root.innerHTML = '';
                root.appendChild(grid);
            } catch (e) {
                appendLog('attack-output', 'Error loading attacks: ' + (e.message || e));
            }
        }

        async function runAttack(name) {
            appendLog('attack-output', 'Running ' + name);
            try {
                const j = await api('/attacks/' + encodeURIComponent(name) + '/execute', {
                    method: 'POST',
                    body: JSON.stringify({params: {}})
                });
                setJobBadge(j.job_id);
                appendLog('attack-output', 'started ' + name + ' job=' + j.job_id);
            } catch (e) {
                appendLog('attack-output', 'Error: ' + (e.message || e));
            }
        }

        async function dryRun(name) {
            appendLog('attack-output', 'Dry run ' + name);
            try {
                const j = await api('/attacks/' + encodeURIComponent(name) + '/execute', {
                    method: 'POST',
                    body: JSON.stringify({params: {}, dry_run: true})
                });
                setJobBadge(j.job_id);
                appendLog('attack-output', 'dry-run ' + name + ' job=' + j.job_id);
            } catch (e) {
                appendLog('attack-output', 'Error: ' + (e.message || e));
            }
        }

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function escapeJs(str) {
            return String(str || '').replace(/'/g, "\\'");
        }

        async function wifiScan() {
            const out = document.getElementById('wifi-output');
            out.textContent = 'Scanning…';
            const iface = document.getElementById('wifi-iface').value || 'wlan1';
            try {
                const params = new URLSearchParams({interface: iface, strategy: 'passive_only'});
                const j = await api('/wifi/scan?' + params.toString(), { method: 'POST' });
                out.textContent = JSON.stringify(j, null, 2);
            } catch (e) {
                out.textContent = 'Error: ' + (e.message || e);
            }
        }

        async function wifiInterfaces() {
            const out = document.getElementById('wifi-output');
            try {
                const j = await api('/wifi/interfaces');
                out.textContent = JSON.stringify(j, null, 2);
            } catch (e) {
                out.textContent = 'Error: ' + (e.message || e);
            }
        }

        async function bleScan() {
            const out = document.getElementById('ble-output');
            out.textContent = 'Scanning…';
            const dur = parseInt(document.getElementById('ble-duration').value || '10', 10);
            try {
                const params = new URLSearchParams({duration: dur});
                const j = await api('/ble/scan?' + params.toString(), { method: 'POST' });
                out.textContent = JSON.stringify(j, null, 2);
            } catch (e) {
                out.textContent = 'Error: ' + (e.message || e);
            }
        }

        async function netScan() {
            const out = document.getElementById('net-output');
            out.textContent = 'Scanning…';
            const target = document.getElementById('net-target').value || '192.168.1.0/24';
            try {
                const params = new URLSearchParams({target: target, scan_type: 'host_discovery'});
                const j = await api('/network/scan?' + params.toString(), { method: 'POST' });
                out.textContent = JSON.stringify(j, null, 2);
            } catch (e) {
                out.textContent = 'Error: ' + (e.message || e);
            }
        }

        async function init() {
            if (!authToken) {
                showLogin();
                return;
            }
            try {
                const info = await api('/info');
                document.getElementById('sys-info').textContent = JSON.stringify(info, null, 2);
                document.getElementById('arch-badge').textContent = info.machine || info.arch || '--';
                await loadAttacks();

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = protocol + '//' + location.host + '/api/v1/events?token=' + encodeURIComponent(authToken);
                let wsReconnectTimer = null;

                function connectWs() {
                    const ws = new WebSocket(wsUrl);
                    const statusBadge = document.getElementById('status-badge');
                    ws.onopen = () => {
                        statusBadge.textContent = 'online';
                        statusBadge.className = 'badge ok';
                        appendLog('logs-output', 'Live feed connected');
                    };
                    ws.onmessage = (ev) => {
                        try {
                            const data = typeof ev.data === 'string' ? JSON.parse(ev.data) : ev.data;
                            appendLog('logs-output', data.type + ' | ' + JSON.stringify(data.payload || {}));
                            if (data.type && data.type.startsWith('attack.')) {
                                appendLog('attack-output', data.type + ' | ' + JSON.stringify(data.payload || {}));
                                if (data.type === 'attack.completed' || data.type === 'attack.error') {
                                    setJobBadge('');
                                }
                            }
                            if (data.type === 'wifi.scan.completed') {
                                appendLog('wifi-output', 'Scan complete: ' + (data.payload?.count || 0) + ' networks');
                            }
                            if (data.type === 'ble.scan.completed') {
                                appendLog('ble-output', 'Scan complete: ' + (data.payload?.count || 0) + ' devices');
                            }
                            if (data.type === 'network.scan.completed') {
                                appendLog('net-output', 'Scan complete: ' + (data.payload?.count || 0) + ' hosts');
                            }
                        } catch {
                            appendLog('logs-output', ev.data);
                        }
                    };
                    ws.onclose = () => {
                        statusBadge.textContent = 'offline';
                        statusBadge.className = 'badge err';
                        appendLog('logs-output', 'Live feed disconnected — reconnecting in 3s');
                        wsReconnectTimer = setTimeout(connectWs, 3000);
                    };
                    ws.onerror = () => appendLog('logs-output', 'Live feed error');
                    return ws;
                }
                connectWs();
            } catch (e) {
                if (e.message !== 'Unauthorized') {
                    document.getElementById('sys-info').textContent = 'Error loading system info';
                }
            }
        }

        if (authToken) {
            init();
        } else {
            showLogin();
        }
    </script>
</body>
</html>
